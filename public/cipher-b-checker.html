<script>
(function(){
  const exchangeSelect = document.getElementById('cbExchangeSelect');
  const marketSelect = document.getElementById('cbMarketSelect');
  const symbolSelect = document.getElementById('cbSymbolSelect');
  const customWrap = document.getElementById('cbCustomWrap');
  const customSymbol = document.getElementById('cbCustomSymbol');
  const loadBtn = document.getElementById('cbLoadBtn');
  const tickerEl = document.getElementById('cbTicker');
  const summaryEl = document.getElementById('cbSummary');
  const gridEl = document.getElementById('cbGrid');

  let miniCharts = {};

  if (!window.__cbZonesRegistered){
    window.__cbZonesRegistered = true;
    Chart.register({
      id: 'cbZones',
      beforeDatasetsDraw(chart, args, opts){
        if (!opts || !opts.enabled) return;
        const { ctx, chartArea, scales } = chart;
        const y = scales.y;
        const yTop = y.getPixelForValue(y.max);
        const y60 = y.getPixelForValue(75);
        const yNeg60 = y.getPixelForValue(-75);
        const yBottom = y.getPixelForValue(y.min);
        ctx.save();
        ctx.fillStyle = 'rgba(255,98,89,.07)';
        ctx.fillRect(chartArea.left, yTop, chartArea.right - chartArea.left, y60 - yTop);
        ctx.fillStyle = 'rgba(47,216,166,.07)';
        ctx.fillRect(chartArea.left, yNeg60, chartArea.right - chartArea.left, yBottom - yNeg60);
        ctx.restore();
      },
      afterDatasetsDraw(chart, args, opts){
        if (!opts || !opts.enabled) return;
        const { ctx, chartArea, scales } = chart;
        const y = scales.y;
        ctx.save();
        ctx.font = "700 10px 'JetBrains Mono', monospace";
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#FF6259';
        ctx.fillText('+75', chartArea.left + 4, y.getPixelForValue(75) - 7);
        ctx.fillStyle = '#2FD8A6';
        ctx.fillText('-75', chartArea.left + 4, y.getPixelForValue(-75) + 7);
        ctx.restore();
      },
    });
  }

  const TIMEFRAMES = [
    { key:'1m',  label:'1m',  biI:'1m',  byI:'1'   },
    { key:'3m',  label:'3m',  biI:'3m',  byI:'3'   },
    { key:'5m',  label:'5m',  biI:'5m',  byI:'5'   },
    { key:'15m', label:'15m', biI:'15m', byI:'15'  },
    { key:'30m', label:'30m', biI:'30m', byI:'30'  },
    { key:'1h',  label:'1H',  biI:'1h',  byI:'60'  },
    { key:'2h',  label:'2H',  biI:'2h',  byI:'120' },
    { key:'4h',  label:'4H',  biI:'4h',  byI:'240' },
    { key:'6h',  label:'6H',  biI:'6h',  byI:'360' },
    { key:'12h', label:'12H', biI:'12h', byI:'720' },
    { key:'1d',  label:'D',   biI:'1d',  byI:'D'   },
    { key:'3d',  label:'3D',  biI:'3d',  byI:'D', bybitAggregate:3 },
    { key:'1w',  label:'W',   biI:'1w',  byI:'W'   },
    { key:'1M',  label:'M',   biI:'1M',  byI:'M'   },
  ];

  symbolSelect.addEventListener('change', () => {
    customWrap.style.display = symbolSelect.value === '__custom' ? 'flex' : 'none';
  });
  loadBtn.addEventListener('click', loadCipher);

  function currentSymbol(){
    if (symbolSelect.value === '__custom') return (customSymbol.value || '').trim().toUpperCase();
    return symbolSelect.value;
  }
  function currentExchange(){ return exchangeSelect.value; }
  function isFutures(){ return marketSelect.value === 'futures'; }
  function displaySymbol(symbol){ return isFutures() ? symbol + '.P' : symbol; }

  async function fetchJson(url, retries){
    retries = retries === undefined ? 2 : retries;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      return await res.json();
    } catch (e) {
      if (retries > 0) { await new Promise(r => setTimeout(r, 400)); return fetchJson(url, retries - 1); }
      throw e;
    }
  }

  async function fetchTicker(symbol){
    if (currentExchange() === 'bybit'){
      const category = isFutures() ? 'linear' : 'spot';
      const data = await fetchJson(`https://api.bybit.com/v5/market/tickers?category=${category}&symbol=${symbol}`);
      if (data.retCode !== 0) throw new Error(symbol + ': ' + (data.retMsg || 'Bybit error'));
      const t = data.result && data.result.list && data.result.list[0];
      if (!t) throw new Error(symbol + ': no ticker data on Bybit.');
      return { lastPrice: parseFloat(t.lastPrice), change1dPct: parseFloat(t.price24hPcnt) * 100 };
    }
    const base = isFutures() ? 'https://fapi.binance.com' : 'https://api.binance.com';
    const path = isFutures() ? '/fapi/v1/ticker/24hr' : '/api/v3/ticker/24hr';
    const t = await fetchJson(`${base}${path}?symbol=${symbol}`);
    return { lastPrice: parseFloat(t.lastPrice), change1dPct: parseFloat(t.priceChangePercent) };
  }

  // Returns full OHLC candles (needed for Heikin Ashi), not just closes.
  async function fetchCandles(symbol, tf){
    const limit = 150;
    if (currentExchange() === 'bybit'){
      const category = isFutures() ? 'linear' : 'spot';
      if (tf.bybitAggregate){
        const need = Math.min(1000, limit * tf.bybitAggregate + 6);
        const data = await fetchJson(`https://api.bybit.com/v5/market/kline?category=${category}&symbol=${symbol}&interval=D&limit=${need}`);
        if (data.retCode !== 0) throw new Error(symbol + ': ' + (data.retMsg || 'Bybit error'));
        const daily = data.result.list.slice().reverse().map(c => ({ open:+c[1], high:+c[2], low:+c[3], close:+c[4] }));
        const grouped = [];
        for (let i = daily.length % tf.bybitAggregate; i < daily.length; i += tf.bybitAggregate){
          const chunk = daily.slice(i, i + tf.bybitAggregate);
          if (chunk.length){
            grouped.push({
              open: chunk[0].open,
              high: Math.max(...chunk.map(c => c.high)),
              low: Math.min(...chunk.map(c => c.low)),
              close: chunk[chunk.length-1].close,
            });
          }
        }
        return grouped;
      }
      const data = await fetchJson(`https://api.bybit.com/v5/market/kline?category=${category}&symbol=${symbol}&interval=${tf.byI}&limit=${limit}`);
      if (data.retCode !== 0) throw new Error(symbol + ': ' + (data.retMsg || 'Bybit error'));
      return data.result.list.slice().reverse().map(c => ({ open:+c[1], high:+c[2], low:+c[3], close:+c[4] }));
    }
    const base = isFutures() ? 'https://fapi.binance.com' : 'https://api.binance.com';
    const path = isFutures() ? '/fapi/v1/klines' : '/api/v3/klines';
    const data = await fetchJson(`${base}${path}?symbol=${symbol}&interval=${tf.biI}&limit=${limit}`);
    return data.map(c => ({ open:+c[1], high:+c[2], low:+c[3], close:+c[4] }));
  }

  function heikinAshi(candles){
    const ha = [];
    for (let i = 0; i < candles.length; i++){
      const c = candles[i];
      const haClose = (c.open + c.high + c.low + c.close) / 4;
      const haOpen = i === 0 ? (c.open + c.close) / 2 : (ha[i-1].open + ha[i-1].close) / 2;
      const haHigh = Math.max(c.high, haOpen, haClose);
      const haLow = Math.min(c.low, haOpen, haClose);
      ha.push({ open: haOpen, high: haHigh, low: haLow, close: haClose });
    }
    return ha;
  }

  function ema(values, period){
    const k = 2 / (period + 1);
    const out = [values[0]];
    for (let i = 1; i < values.length; i++) out.push(values[i] * k + out[i-1] * (1-k));
    return out;
  }
  function sma(values, period){
    const out = new Array(values.length).fill(null);
    for (let i = period - 1; i < values.length; i++){
      let sum = 0;
      for (let j = i - period + 1; j <= i; j++) sum += values[j];
      out[i] = sum / period;
    }
    return out;
  }

  // Wave Trend on Heikin Ashi HLC3
  function waveTrend(candles){
    const ha = heikinAshi(candles);
    const haHlc3 = ha.map(c => (c.high + c.low + c.close) / 3);
    const x = ema(haHlc3, 9);
    const absDiff = haHlc3.map((v, i) => Math.abs(v - x[i]));
    const y = ema(absDiff, 9);
    const z = haHlc3.map((v, i) => (v - x[i]) / (0.015 * (y[i] || 1e-9)));
    const fast = ema(z, 12);
    const slow = sma(fast, 3);
    return { fast, slow };
  }

  // Money Flow on regular HLC3
  function moneyFlow(candles){
    const hlc3 = candles.map(c => (c.high + c.low + c.close) / 3);
    const m = sma(hlc3, 5);
    const f = sma(hlc3.map((v, i) => m[i] !== null ? Math.abs(v - m[i]) : 0), 5);
    const zRaw = hlc3.map((v, i) => (m[i] !== null && f[i]) ? (v - m[i]) / (0.015 * f[i]) : 0);
    const mf = sma(zRaw, 60);
    return mf;
  }

  function lastCrossDirection(fast, slow, lookback){
    lookback = lookback || 3;
    for (let i = fast.length - 1; i >= Math.max(1, fast.length - lookback); i--){
      if (slow[i] === null || slow[i-1] === null) continue;
      if (fast[i-1] <= slow[i-1] && fast[i] > slow[i]) return 'bull';
      if (fast[i-1] >= slow[i-1] && fast[i] < slow[i]) return 'bear';
    }
    return null;
  }

  function badge(dir){
    return `<span class="cb-info-item"><span class="lbl">Signal</span><span class="val ${dir==='bull'?'bull':dir==='bear'?'bear':'neutral'}">${dir==='bull'?'Bullish Cross':dir==='bear'?'Bearish Cross':'No Recent Cross'}</span></span>`;
  }

  async function loadCipher(){
    const symbol = currentSymbol();
    if (!symbol){
      tickerEl.innerHTML = '<span style="color:var(--bear);">Enter a valid symbol.</span>';
      return;
    }
    loadBtn.disabled = true;
    loadBtn.textContent = 'Loading…';
    tickerEl.innerHTML = '<span style="color:var(--muted);">Loading…</span>';
    summaryEl.innerHTML = '';
    gridEl.innerHTML = '';
    Object.values(miniCharts).forEach(c => c.destroy());
    miniCharts = {};

    try {
      const ticker = await fetchTicker(symbol);
      tickerEl.innerHTML = `<span style="font-weight:700;color:var(--tape);">${displaySymbol(symbol)}</span><span>${ticker.lastPrice.toLocaleString(undefined,{maximumFractionDigits: ticker.lastPrice<1?6:2})}</span><span class="${ticker.change1dPct>=0?'up':'down'}">${ticker.change1dPct>=0?'+':''}${ticker.change1dPct.toFixed(2)}%</span>`;

      const results = await Promise.allSettled(TIMEFRAMES.map(tf => fetchCandles(symbol, tf)));

      results.forEach((r, i) => {
        const tf = TIMEFRAMES[i];
        if (r.status !== 'fulfilled' || !r.value || r.value.length < 70){
          const chip = document.createElement('div');
          chip.className = 'cb-summary-chip';
          chip.innerHTML = `<span class="tf">${tf.label}</span><span class="val neutral">n/a</span>`;
          summaryEl.appendChild(chip);
          return;
        }
        const candles = r.value;
        const { fast, slow } = waveTrend(candles);
        const mf = moneyFlow(candles);
        const wtLast = fast[fast.length-1];
        const mfLast = mf[mf.length-1];
        const status = wtLast >= 75 ? 'ob' : wtLast <= -75 ? 'os' : 'neutral';
        const statusLabel = status === 'ob' ? 'Overbought' : status === 'os' ? 'Oversold' : 'Neutral';
        const cross = lastCrossDirection(fast, slow);

        const chip = document.createElement('div');
        chip.className = 'cb-summary-chip ' + status;
        chip.innerHTML = `<span class="tf">${tf.label}</span><span class="val ${status}">${wtLast.toFixed(0)}</span>`;
        summaryEl.appendChild(chip);

        const box = document.createElement('div');
        box.className = 'cb-box ' + status;
        box.innerHTML = `
          <div class="cb-box-head">
            <span class="cb-box-tf">${tf.label}</span>
            <span class="cb-box-val ${status}">${wtLast.toFixed(1)}</span>
          </div>
          <div class="cb-box-status">${statusLabel}</div>
          <canvas id="cbChart-${tf.key}" height="140"></canvas>
          <div class="cb-mf-label">
            <span>MONEY FLOW</span>
            <span class="val ${mfLast>0?'bull':mfLast<0?'bear':'neutral'}">${mfLast>0?'Bullish':mfLast<0?'Bearish':'Flat'} · ${mfLast.toFixed(1)}</span>
          </div>
          <canvas id="cbMfChart-${tf.key}" height="52"></canvas>
          <div class="cb-info-row">
            ${badge(cross)}
          </div>
        `;
        gridEl.appendChild(box);

        const labels = fast.map((_, idx) => idx);
        const crossPoints = fast.map((v, idx) => {
          if (idx === 0 || slow[idx] === null || slow[idx-1] === null) return null;
          if (fast[idx-1] <= slow[idx-1] && fast[idx] > slow[idx]) return { idx, dir:'bull' };
          if (fast[idx-1] >= slow[idx-1] && fast[idx] < slow[idx]) return { idx, dir:'bear' };
          return null;
        });

        if (miniCharts[tf.key]) miniCharts[tf.key].destroy();
        miniCharts[tf.key] = new Chart(document.getElementById('cbChart-' + tf.key), {
          type: 'line',
          data: {
            labels,
            datasets: [
              { data: fast, borderColor:'#C1CBFF', backgroundColor:'rgba(193,203,255,.12)', borderWidth:1.6, pointRadius:0, tension:.1, fill:true },
              { data: slow, borderColor:'#0019FA', backgroundColor:'rgba(0,25,250,.08)', borderWidth:1.6, pointRadius:0, tension:.1, fill:true },
              {
                data: fast.map((v, idx) => { const cp = crossPoints[idx]; return cp ? v : null; }),
                borderColor:'transparent', showLine:false,
                pointRadius: fast.map((v, idx) => crossPoints[idx] ? 5 : 0),
                pointBackgroundColor: fast.map((v, idx) => crossPoints[idx] ? (crossPoints[idx].dir==='bull'?'#00E676':'#FF5252') : 'transparent'),
                pointBorderWidth: 0,
              },
            ],
          },
          options: {
            responsive: true,
            animation: { duration:300 },
            plugins: { legend:{ display:false }, cbZones:{ enabled:true } },
            scales: {
              x: { display:false },
              y: { ticks:{ color:'#9AA6B2', font:{family:'JetBrains Mono', size:10, weight:'600'} }, grid:{ color:'#1A2029' } },
            },
          },
        });

        const mfSlice = mf.map(v => v === null ? 0 : v);
        miniCharts[tf.key + '_mf'] = new Chart(document.getElementById('cbMfChart-' + tf.key), {
          type: 'bar',
          data: {
            labels,
            datasets: [{
              data: mfSlice,
              backgroundColor: mfSlice.map(v => v >= 0 ? 'rgba(60,255,0,.55)' : 'rgba(255,17,0,.55)'),
              borderWidth: 0,
              barPercentage: 1.0,
              categoryPercentage: 1.0,
            }],
          },
          options: {
            responsive: true,
            animation: { duration:300 },
            plugins: { legend:{ display:false } },
            scales: {
              x: { display:false },
              y: { display:false },
            },
          },
        });
      });
    } catch (e) {
      tickerEl.innerHTML = `<span style="color:var(--bear);">${e.message || 'Failed to load data.'}</span>`;
      gridEl.innerHTML = '';
    } finally {
      loadBtn.disabled = false;
      loadBtn.textContent = 'Load';
    }
  }

  loadCipher();
})();
</script>
<script>
(function(){
  function hasSessionCookie(){
    return document.cookie.split(';').some(function(c){ return c.trim().indexOf('aft_session=') === 0; });
  }
  var dashBtn = document.getElementById('navDashLink');
  var nameEl = document.getElementById('navUserName');
  var logoutBtn = document.getElementById('navLogoutBtn');
  var loginLink = document.getElementById('navLoginLink');
  var navToggle = document.getElementById('navToggle');
  var navLinksEl = document.getElementById('navLinks');
  if (navToggle && navLinksEl){
    navToggle.addEventListener('click', function(){ navLinksEl.classList.toggle('open'); });
  }

  if (!hasSessionCookie()){
    if (dashBtn) dashBtn.style.display = 'none';
    if (loginLink) loginLink.style.display = 'inline-block';
  } else {
    fetch('https://api.alifaisal.trade/api/auth/refresh', { method: 'POST', credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(body){
        return fetch('https://api.alifaisal.trade/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + body.accessToken },
        });
      })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(data){
        if (nameEl && data.user.full_name) { nameEl.textContent = data.user.full_name; nameEl.style.display = 'inline'; }
        if (logoutBtn) logoutBtn.style.display = 'inline-block';
      })
      .catch(function(){
        if (dashBtn) dashBtn.style.display = 'none';
        if (loginLink) loginLink.style.display = 'inline-block';
      });
  }

  if (logoutBtn){
    logoutBtn.addEventListener('click', function(){
      fetch('https://api.alifaisal.trade/api/auth/logout', { method: 'POST', credentials: 'include' })
        .finally(function(){
          document.cookie = 'aft_session=; path=/; max-age=0';
          window.location.href = '/';
        });
    });
  }
})();
</script>
</body>
</html>
