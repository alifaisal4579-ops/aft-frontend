<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<title>Position Size Calculator — Ali Faisal Trades</title>
<meta name="theme-color" content="#080B10">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Manrope:wght@400;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0D12; --surface:#121821; --surface-2:#171E28;
    --border:#242C38; --text:#EAEEF3; --muted:#7C8998;
    --bull:#2FD8A6; --bear:#FF6259; --tape:#E8A63C; --cyan:#E8A63C;
    --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --sans: 'Manrope', -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    --display: 'Space Grotesk', var(--sans);
  }
  --glass:rgba(255,255,255,.045); --glass-hover:rgba(255,255,255,.075);
  --glass-border:rgba(255,255,255,.09); --glass-border-hover:rgba(232,166,60,.4);
  .site-nav-outer{position:sticky;top:0;z-index:60;background:var(--bg);border-bottom:1px solid var(--border);}
  nav.site-nav{
    max-width:1400px;margin:0 auto;width:100%;display:flex;align-items:center;justify-content:space-between;
    gap:24px;padding:16px 32px;position:relative;
  }
  .nav-toggle{display:none;background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:8px 10px;cursor:pointer;align-items:center;justify-content:center;}
  .nav-brand{display:flex;align-items:center;gap:10px;flex-shrink:0;text-decoration:none;}
  .nav-avatar{
    width:32px;height:32px;border-radius:50%;object-fit:cover;flex-shrink:0;
    border:1.5px solid rgba(255,255,255,.2);
    box-shadow:0 0 0 3px rgba(232,166,60,.14),0 2px 10px rgba(0,0,0,.45);
    backdrop-filter:blur(6px) saturate(140%);-webkit-backdrop-filter:blur(6px) saturate(140%);
  }
  .site-nav .logo{font-family:var(--sans);font-weight:700;font-size:15px;white-space:nowrap;color:var(--text);}
  .nav-links{display:flex;align-items:center;justify-content:flex-end;gap:28px;flex:1;flex-wrap:wrap;}
  .nav-links a{font-family:var(--sans);font-size:14px;color:var(--muted);text-decoration:none;white-space:nowrap;transition:color .15s ease;}
  .nav-links a:hover{color:var(--text);}
  .nav-links a.current{color:var(--tape);}
  .nav-dashboard-btn{background:var(--tape);color:#0A0D12!important;font-weight:700;padding:8px 18px;border-radius:6px;transition:filter .15s ease;}
  .nav-dashboard-btn:hover{filter:brightness(1.08);color:#0A0D12!important;}
  .nav-user-group{display:flex;align-items:center;gap:16px;flex-shrink:0;}
  .nav-dashboard-link{
    font-family:var(--sans);font-size:14px;font-weight:700;color:var(--tape);
    border:1px solid rgba(232,166,60,.4);padding:8px 18px;border-radius:6px;
    background:rgba(232,166,60,.08);text-decoration:none;white-space:nowrap;transition:all .2s ease;
  }
  .nav-dashboard-link:hover{border-color:rgba(232,166,60,.7);background:rgba(232,166,60,.15);}
  .nav-telegram{
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:#8fd4f5;
    border:1px solid rgba(94,196,240,.3);padding:8px 16px;border-radius:6px;
    background:rgba(94,196,240,.06);display:flex;align-items:center;gap:6px;
    text-decoration:none;white-space:nowrap;transition:all .2s ease;
  }
  .nav-telegram:hover{border-color:rgba(94,196,240,.6);background:rgba(94,196,240,.12);}
  .nav-telegram svg{width:14px;height:14px;flex-shrink:0;}
  .nav-user-name{font-family:var(--sans);font-size:14px;color:var(--muted);white-space:nowrap;}
  .nav-logout-btn{
    font-family:var(--sans);font-size:13.5px;font-weight:600;color:var(--muted);
    border:1px solid var(--border);padding:8px 16px;border-radius:6px;
    background:transparent;cursor:pointer;white-space:nowrap;transition:all .2s ease;
  }
  .nav-logout-btn:hover{border-color:rgba(255,98,89,.5);color:var(--bear);background:rgba(255,98,89,.06);}

  @media (max-width:860px){
    .nav-toggle{display:flex;}
    .nav-links{
      display:none;position:absolute;top:100%;left:0;right:0;z-index:70;
      flex-direction:column;align-items:stretch;gap:0;
      background:var(--bg);border-bottom:1px solid var(--border);
      padding:8px 20px 16px;
    }
    .nav-links.open{display:flex;}
    .nav-links a{padding:12px 0;border-bottom:1px solid var(--border);}
    .nav-links a:last-child{border-bottom:none;}
    .nav-dashboard-btn{margin-top:10px;text-align:center;}
    .nav-user-name{display:none;}
    nav.site-nav{padding:14px 16px;}
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{min-height:100vh;display:flex;flex-direction:column;padding:0 0 60px;}
  .ps-center{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;}

  .ps-card{
    width:100%;max-width:520px;background:var(--surface);border:1px solid var(--border);
    border-radius:12px;padding:28px 28px 24px;position:relative;overflow:hidden;
    box-shadow:0 20px 50px -25px rgba(0,0,0,.6);
  }
  .ps-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:2px;
    background:linear-gradient(90deg,var(--tape),transparent 70%);
  }
  h1{margin:0 0 2px;font-family:var(--display);font-size:22px;font-weight:700;color:var(--text);}
  .ps-by{margin:0 0 22px;font-family:var(--mono);font-size:11.5px;color:var(--muted);letter-spacing:.04em;}
  .ps-field{margin-bottom:16px;}
  .ps-field label{display:block;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--muted);margin-bottom:6px;text-transform:uppercase;}
  .ps-field input{
    width:100%;background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    padding:10px 12px;border-radius:5px;font-family:var(--mono);font-size:13px;
  }
  .ps-field input::placeholder{color:var(--muted);}
  .ps-field input:focus{outline:1px solid var(--cyan);outline-offset:0;}
  #psCalcBtn{
    width:100%;background:var(--bull);color:#08130D;border:none;border-radius:6px;
    padding:12px 16px;font-family:var(--mono);font-size:12.5px;font-weight:700;
    letter-spacing:.03em;cursor:pointer;margin-top:4px;
  }
  #psCalcBtn:hover{opacity:.9;}
  .ps-result{
    margin-top:16px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;
    padding:14px 16px;font-family:var(--mono);font-size:12.5px;color:var(--muted);line-height:1.9;
  }
  .ps-result .ps-row{display:flex;justify-content:space-between;gap:12px;}
  .ps-result .ps-row b{color:var(--text);}
  .ps-result.ps-error{color:var(--bear);}
</style>
</head>
<body>

<div class="site-nav-outer">
  <nav class="site-nav">
    <a href="/" class="nav-brand">
      <img src="/logo.jpg" alt="Ali Faisal Trades" class="nav-avatar">
      <span class="logo">Ali Faisal Trades</span>
    </a>
    <button class="nav-toggle" id="navToggle" aria-label="Menu">
      <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M3 5h14M3 10h14M3 15h14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
    </button>
    <div class="nav-links" id="navLinks">
      <a href="/sector-screener.html">Sector Screener</a>
      <a href="/confluence-dashboard.html">Confluence Dashboard</a>
      <a href="/position-size-calculator.html" class="current">Position Size Calculator</a>
      <a href="/dashboard" class="nav-dashboard-btn" id="navDashLink">Dashboard</a>
    </div>
    <div class="nav-user-group" id="navUserGroup">
      <a class="nav-telegram" href="https://t.me/alifaisaltrades" target="_blank" rel="noopener">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M9.78 18.65l.28-4.23 7.68-6.92c.34-.31-.07-.46-.52-.19L7.74 13.3 3.64 12c-.88-.25-.89-.86.2-1.3l15.97-6.16c.73-.33 1.43.18 1.15 1.3l-2.72 12.81c-.19.91-.74 1.13-1.5.71l-4.14-3.05-2 1.92c-.23.23-.42.42-.82.42z"/></svg>
        <span>Telegram</span>
      </a>
      <span class="nav-user-name" id="navUserName" style="display:none;">&hellip;</span>
      <button class="nav-logout-btn" id="navLogoutBtn" style="display:none;">Log out</button>
      <a href="/login" class="nav-dashboard-link" id="navLoginLink" style="display:none;">Log in</a>
    </div>
  </nav>
</div>

<div class="ps-center">
<div class="ps-card">
  <h1>Position Size Calculator</h1>
  <p class="ps-by">by Ali Faisal</p>

  <div class="ps-field">
    <label>Total Portfolio Amount (USD)</label>
    <input type="number" id="psPortfolio" placeholder="Enter your portfolio amount" min="0" step="any" />
  </div>
  <div class="ps-field">
    <label>Risk Per Trade (% of Portfolio)</label>
    <input type="number" id="psRiskPct" placeholder="Enter risk per trade percentage" min="0" max="100" step="any" />
  </div>
  <div class="ps-field">
    <label>Stop-Loss Percentage (%)</label>
    <input type="number" id="psStopLoss" placeholder="Enter stop-loss percentage" min="0" max="100" step="any" />
  </div>

  <button id="psCalcBtn">Calculate Position Size</button>

  <div id="psResult" class="ps-result">Fill in the fields above and press Calculate.</div>
</div>
</div>

<script>
(function(){
  const portfolioInput = document.getElementById('psPortfolio');
  const riskInput = document.getElementById('psRiskPct');
  const stopLossInput = document.getElementById('psStopLoss');
  const calcBtn = document.getElementById('psCalcBtn');
  const resultEl = document.getElementById('psResult');

  function fmtUsd(v){
    return '$' + v.toLocaleString(undefined, {minimumFractionDigits:2, maximumFractionDigits:2});
  }

  function calculate(){
    const portfolio = parseFloat(portfolioInput.value);
    const riskPct = parseFloat(riskInput.value);
    const stopLossPct = parseFloat(stopLossInput.value);

    if (!portfolio || portfolio <= 0){
      resultEl.className = 'ps-result ps-error';
      resultEl.textContent = 'Enter a valid portfolio amount.';
      return;
    }
    if (!riskPct || riskPct <= 0 || riskPct > 100){
      resultEl.className = 'ps-result ps-error';
      resultEl.textContent = 'Enter a risk-per-trade % between 0 and 100.';
      return;
    }
    if (!stopLossPct || stopLossPct <= 0 || stopLossPct > 100){
      resultEl.className = 'ps-result ps-error';
      resultEl.textContent = 'Enter a stop-loss % between 0 and 100.';
      return;
    }

    const riskAmount = portfolio * (riskPct / 100);
    const positionSize = riskAmount / (stopLossPct / 100);
    const positionPctOfPortfolio = (positionSize / portfolio) * 100;

    resultEl.className = 'ps-result';
    resultEl.innerHTML = `
      <div class="ps-row"><span>Risk amount (this trade)</span><b>${fmtUsd(riskAmount)}</b></div>
      <div class="ps-row"><span>Recommended position size</span><b>${fmtUsd(positionSize)}</b></div>
      <div class="ps-row"><span>Position size vs portfolio</span><b>${positionPctOfPortfolio.toFixed(1)}%</b></div>
    `;
  }

  calcBtn.addEventListener('click', calculate);
  [portfolioInput, riskInput, stopLossInput].forEach(el => {
    el.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
  });
})();
</script>

<script>
(function(){
  function hasSessionCookie(){
    return document.cookie.split(';').some(function(c){ return c.trim().indexOf('aft_session=') === 0; });
  }
  var dashBtn = document.getElementById('navDashLink');
  var nameEl = document.getElementById('navUserName');
  var logoutBtn = document.getElementById('navLogoutBtn');
  var loginLink = document.getElementById('navLoginLink');
  var navToggle = document.getElementById('navToggle');
  var navLinksEl = document.getElementById('navLinks');
  if (navToggle && navLinksEl){
    navToggle.addEventListener('click', function(){ navLinksEl.classList.toggle('open'); });
  }

  if (!hasSessionCookie()){
    if (dashBtn) dashBtn.style.display = 'none';
    if (loginLink) loginLink.style.display = 'inline-block';
  } else {
    fetch('https://api.alifaisal.trade/api/auth/refresh', { method: 'POST', credentials: 'include' })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(body){
        return fetch('https://api.alifaisal.trade/api/auth/me', {
          headers: { 'Authorization': 'Bearer ' + body.accessToken },
        });
      })
      .then(function(r){ return r.ok ? r.json() : Promise.reject(); })
      .then(function(data){
        if (nameEl && data.user.full_name) { nameEl.textContent = data.user.full_name; nameEl.style.display = 'inline'; }
        if (logoutBtn) logoutBtn.style.display = 'inline-block';
      })
      .catch(function(){
        if (dashBtn) dashBtn.style.display = 'none';
        if (loginLink) loginLink.style.display = 'inline-block';
      });
  }

  if (logoutBtn){
    logoutBtn.addEventListener('click', function(){
      fetch('https://api.alifaisal.trade/api/auth/logout', { method: 'POST', credentials: 'include' })
        .finally(function(){
          document.cookie = 'aft_session=; path=/; max-age=0';
          window.location.href = '/';
        });
    });
  }
})();
</script>
</body>
</html>
